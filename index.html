<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Animated Blur Loading</title>

<style>
  body {
    margin: 0;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .image-container {
    position: relative;
    overflow: hidden;
  }

  img {
    width: 600px;
    height: auto;
    filter: blur(50px) brightness(0.6);
    transform: scale(1.1);
    opacity: 0;
  }

  /* Анимация */
  .loaded {
    animation: reveal 6s ease forwards;
  }

  @keyframes reveal {
    0% {
      filter: blur(50px) brightness(0.6);
      transform: scale(1.1);
      opacity: 0;
    }
    50% {
      filter: blur(20px) brightness(0.8);
      opacity: 0.5;
    }
    100% {
      filter: blur(0px) brightness(1);
      transform: scale(1);
      opacity: 1;
    }
  }
</style>
</head>

<body>

<div class="image-container">
  <img id="myImage" src="image.jpg" alt="image">
</div>

<script>
  const img = document.getElementById('myImage');

  img.onload = () => {
    // имитация долгой загрузки
    setTimeout(() => {
      img.classList.add('loaded');
    }, 3000);
  };
</script>

</body>
</html>
